steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/face-search-service:$COMMIT_SHA'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/face-search-service:$COMMIT_SHA'
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'face-search-service'
      - '--image'
      - 'gcr.io/$PROJECT_ID/face-search-service:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--set-env-vars=AWS_REGION=${_AWS_REGION}'
      - '--set-env-vars=REKOGNITION_COLLECTION_ID=${_REKOGNITION_COLLECTION_ID}'
      # DATABASE_URL y FACE_SEARCH_TOKEN se montan desde Secret Manager (ver README.md).
      # Para montarlos:
      #   gcloud run services update face-search-service \
      #     --update-secrets=DATABASE_URL=DATABASE_URL:latest,\
      #                    FACE_SEARCH_TOKEN=FACE_SEARCH_TOKEN:latest
      # Una vez montados, Cloud Run los expone como env vars al contenedor.
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest'
      - '--set-secrets=FACE_SEARCH_TOKEN=FACE_SEARCH_TOKEN:latest'

substitutions:
  _AWS_REGION: us-east-1
  _REKOGNITION_COLLECTION_ID: socios_stadium_users

images:
  - 'gcr.io/$PROJECT_ID/face-search-service:$COMMIT_SHA'