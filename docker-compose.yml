services:
    face-search:
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - "8081:8080"
        env_file:
            - .env.development
        environment:
            DATABASE_URL: postgres://${POSTGRES_USER:-app_perfil}:${POSTGRES_PASSWORD:-dev_password}@host.docker.internal:5436/${POSTGRES_DB:-app_perfil_development}?sslmode=disable
            PORT: "8080"
